<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Mua Hàng - Harmony Canvas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container header-top-row">
            <div class="header-left"></div>
            <a href="index.html" class="logo">Harmony <span>Canvas</span></a>
            <div class="nav-actions">
                <a href="index.html" style="font-size: 14px; text-decoration: none; color: var(--text-primary);">Về Trang Chủ</a>
            </div>
        </div>
    </header>

    <main class="container" style="max-width: 600px; padding: 60px 20px;">
        <h1 style="text-align: center; font-family: var(--font-serif); margin-bottom: 24px;">Tra Cứu Lịch Sử Đơn Hàng</h1>
        
        <div class="checkout-card">
            <p style="color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 24px;">
                Nhập số điện thoại bạn đã dùng để đặt hàng để xem tình trạng các đơn hàng.
            </p>
            <form id="history-form" style="display: flex; gap: 12px; max-width: 400px; margin: 0 auto;">
                <input type="text" id="phone-input" class="form-input" placeholder="Ví dụ: 0901234567" required style="margin-bottom: 0;">
                <button type="submit" class="order-btn" id="search-btn" style="flex-shrink: 0; width: auto; padding: 0 24px;">Tra Cứu</button>
            </form>
        </div>

        <div id="results-container" style="margin-top: 32px; display: none;">
            <!-- Order list will be injected here -->
        </div>
    </main>

    <script>
        document.getElementById('history-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone-input').value.trim();
            if(!phone) return;

            const btn = document.getElementById('search-btn');
            btn.disabled = true;
            btn.innerText = 'Đang tìm...';
            
            const resultsDiv = document.getElementById('results-container');
            
            try {
                const response = await fetch(`/api/orders/phone/${phone}`);
                if (!response.ok) throw new Error('Không tìm thấy đơn hàng');
                
                const orders = await response.json();
                
                if (orders.length === 0) {
                    resultsDiv.innerHTML = `<div style="text-align:center; color: var(--text-secondary);">Không tìm thấy đơn hàng nào cho số điện thoại này.</div>`;
                } else {
                    resultsDiv.innerHTML = orders.map(order => {
                        const date = new Date(order.created_at).toLocaleString('vi-VN');
                        const statusColor = order.status === 'PAID' ? 'var(--success)' : 'orange';
                        
                        // Parse cart
                        let cartItems = [];
                        try {
                            cartItems = typeof order.cart === 'string' ? JSON.parse(order.cart) : order.cart;
                        } catch(e) {}
                        
                        const itemsHtml = cartItems.map(item => `
                            <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 8px;">
                                <span>${item.quantity}x ${item.name} (${item.size})</span>
                                <span>${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(item.price)}</span>
                            </div>
                        `).join('');

                        return `
                            <div class="checkout-card" style="margin-bottom: 16px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
                                    <div>
                                        <div style="font-weight: 700;">Đơn hàng: #${order.id.substring(0, 8).toUpperCase()}</div>
                                        <div style="font-size: 12px; color: var(--text-secondary);">${date}</div>
                                    </div>
                                    <span style="background-color: ${statusColor}; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;">
                                        ${order.status === 'PAID' ? 'Đã Thanh Toán' : 'Chờ Thanh Toán'}
                                    </span>
                                </div>
                                <div style="margin-bottom: 16px;">
                                    ${itemsHtml}
                                </div>
                                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 15px;">
                                    <span>Tổng cộng:</span>
                                    <span style="color: var(--accent);">${new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(order.total_amount)}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                resultsDiv.style.display = 'block';
            } catch (error) {
                resultsDiv.innerHTML = `<div style="text-align:center; color: var(--danger);">Lỗi khi tìm kiếm. Vui lòng thử lại.</div>`;
                resultsDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Tra Cứu';
            }
        });
    </script>
</body>
</html>
